name: scout-stocks

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 平日毎日 16:00 JST (= 07:00 UTC)
  workflow_dispatch:         # 手動実行も可能

jobs:
  scout-stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install-deps
        run: pip install yfinance pytz requests pandas openpyxl xlrd

      - name: scout
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scripts/scout_stocks.py

      - name: save-scouted
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/scouted.json || true
          git diff --staged --quiet || git commit -m "update scouted $(TZ='Asia/Tokyo' date '+%Y-%m-%d') JST"
          git push || true
