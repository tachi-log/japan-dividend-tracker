name: fetch-stocks

"on":
  schedule:
    - cron: '35 2 * * 1-5'
    - cron: '35 6 * * 1-5'
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install-deps
        run: pip install yfinance pytz requests

      - name: fetch-data
        run: python scripts/fetch_stocks.py

      - name: translate-to-japanese
        run: python scripts/translate_names.py

      - name: commit-push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/stocks.json
          git diff --staged --quiet || git commit -m "update stocks $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M') JST"
          git push
